<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tony's Card Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-container">

  <header>
    <div class="banner">
      <img src="banner.jpg" alt="Tony's Card Collection Banner">
    </div>

    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="youtube.html">YouTube</a>
      <a href="winners.html">Current Winners</a>
      <a href="board.html">Posting Board</a>
    </nav>
  </header>

  <main>
    <h1>GOAT Collection Viewer</h1>

    <div class="topbar">
      <input id="searchBox" placeholder="Search by name, attribute, type, or level">
      <button onclick="searchCards()">Search</button>
      <button onclick="clearSearch()">Show Full List</button>
      <button onclick="buildMetadataIndex()">Build Search Index</button>
    </div>

    <p class="hint">
      Examples: Jinzo, DARK, Spell Card, Warrior, level:4, count:2, you own: 0
    </p>

    <div id="filterChips" class="chips"></div>

    <div id="status"></div>
    <div id="result"></div>
  </main>
</div>

  <script src="script.js"></script>
</body>
</html>
